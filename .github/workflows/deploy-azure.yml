name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: rg-polymarket-btc15-dev
  AZURE_LOCATION: eastus
  APP_NAME: polymarket-btc15
  GITHUB_DEPLOY_IDENTITY_NAME: id-github-polymarket-btc15-dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest -q tests
          python -m compileall -q src tests

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group
        run: |
          az group create \
            --name "$AZURE_RESOURCE_GROUP" \
            --location "$AZURE_LOCATION"

      - name: Resolve current app image
        id: current_image
        run: |
          container_app_name="$APP_NAME-dev"
          image=$(az containerapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$container_app_name" \
            --query 'properties.template.containers[0].image' \
            -o tsv 2>/dev/null || true)
          if [ -z "$image" ]; then
            image="mcr.microsoft.com/azuredocs/containerapps-helloworld:latest"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --name "$APP_NAME-infra" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --parameters appName="$APP_NAME" image="${{ steps.current_image.outputs.image }}" apiBearerToken="${{ secrets.API_BEARER_TOKEN }}"

      - name: Read deployment outputs
        id: deploy_outputs
        run: |
          outputs=$(az deployment group show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$APP_NAME-infra" \
            --query properties.outputs)
          echo "acr_name=$(echo "$outputs" | jq -r '.acrName.value')" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(echo "$outputs" | jq -r '.acrLoginServer.value')" >> "$GITHUB_OUTPUT"
          echo "container_app_name=$(echo "$outputs" | jq -r '.containerAppName.value')" >> "$GITHUB_OUTPUT"
          echo "container_app_fqdn=$(echo "$outputs" | jq -r '.containerAppFqdn.value')" >> "$GITHUB_OUTPUT"

      - name: Grant workflow ACR push
        run: |
          principal_id=$(az identity show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$GITHUB_DEPLOY_IDENTITY_NAME" \
            --query principalId \
            -o tsv)
          acr_id=$(az acr show \
            --name "${{ steps.deploy_outputs.outputs.acr_name }}" \
            --query id \
            -o tsv)
          az role assignment create \
            --assignee-object-id "$principal_id" \
            --assignee-principal-type ServicePrincipal \
            --role AcrPush \
            --scope "$acr_id" \
            || true

      - name: Build and push image
        run: |
          az acr login --name "${{ steps.deploy_outputs.outputs.acr_name }}"
          image="${{ steps.deploy_outputs.outputs.acr_login_server }}/polymarket-btc15-bot:${{ github.sha }}"
          docker build -t "$image" .
          docker push "$image"
          echo "IMAGE=$image" >> "$GITHUB_ENV"

      - name: Configure registry and deploy app image
        run: |
          az containerapp registry set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "${{ steps.deploy_outputs.outputs.container_app_name }}" \
            --server "${{ steps.deploy_outputs.outputs.acr_login_server }}" \
            --identity system

          az containerapp update \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "${{ steps.deploy_outputs.outputs.container_app_name }}" \
            --image "$IMAGE"

      - name: Print endpoint
        run: |
          echo "https://${{ steps.deploy_outputs.outputs.container_app_fqdn }}"
