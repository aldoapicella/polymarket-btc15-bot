name: Deploy PolyEdge Active to Azure

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: rg-polyedge-dev
  AZURE_LOCATION: eastus
  APP_NAME: polyedge

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest -q tests
          python -m compileall -q src tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and test frontend
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate resource group
        run: |
          az group show --name "$AZURE_RESOURCE_GROUP" --query name -o tsv

      - name: Bootstrap active infrastructure
        run: |
          az deployment group create \
            --name "$APP_NAME-active-infra" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/parameters/polyedge-active.bicepparam \
            --parameters image="mcr.microsoft.com/azuredocs/containerapps-helloworld:latest" minReplicas=0 apiBearerToken="${{ secrets.API_BEARER_TOKEN }}"

      - name: Read deployment outputs
        id: deploy_outputs
        run: |
          outputs=$(az deployment group show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$APP_NAME-active-infra" \
            --query properties.outputs)
          echo "acr_name=$(echo "$outputs" | jq -r '.acrName.value')" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(echo "$outputs" | jq -r '.acrLoginServer.value')" >> "$GITHUB_OUTPUT"
          echo "container_app_name=$(echo "$outputs" | jq -r '.containerAppName.value')" >> "$GITHUB_OUTPUT"
          echo "container_app_fqdn=$(echo "$outputs" | jq -r '.containerAppFqdn.value')" >> "$GITHUB_OUTPUT"

      - name: Grant workflow ACR push
        run: |
          principal_id=$(az ad sp show --id "${{ secrets.AZURE_CLIENT_ID }}" --query id -o tsv)
          acr_id=$(az acr show \
            --name "${{ steps.deploy_outputs.outputs.acr_name }}" \
            --query id \
            -o tsv)
          az role assignment create \
            --assignee-object-id "$principal_id" \
            --assignee-principal-type ServicePrincipal \
            --role AcrPush \
            --scope "$acr_id" \
            || true

      - name: Build and push images
        run: |
          az acr login --name "${{ steps.deploy_outputs.outputs.acr_name }}"
          backend_image="${{ steps.deploy_outputs.outputs.acr_login_server }}/polyedge-backend:${{ github.sha }}"
          frontend_image="${{ steps.deploy_outputs.outputs.acr_login_server }}/polyedge-frontend:${{ github.sha }}"
          docker build -t "$backend_image" .
          docker build -f Dockerfile.frontend -t "$frontend_image" .
          docker push "$backend_image"
          docker push "$frontend_image"
          echo "BACKEND_IMAGE=$backend_image" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=$frontend_image" >> "$GITHUB_ENV"

      - name: Deploy active images
        run: |
          az deployment group create \
            --name "$APP_NAME-active-infra" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/parameters/polyedge-active.bicepparam \
            --parameters image="$BACKEND_IMAGE" frontendImage="$FRONTEND_IMAGE" apiBearerToken="${{ secrets.API_BEARER_TOKEN }}"

      - name: Verify active writer configuration
        run: |
          app="${{ steps.deploy_outputs.outputs.container_app_name }}"
          run_on_startup=$(az containerapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$app" \
            --query "properties.template.containers[?name=='bot'].env[?name=='RUN_BOT_ON_STARTUP'].value | [0]" \
            -o tsv)
          backend_base=$(az containerapp show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$app" \
            --query "properties.template.containers[?name=='frontend'].env[?name=='BACKEND_API_BASE_URL'].value | [0]" \
            -o tsv)
          test "$run_on_startup" = "true"
          test "$backend_base" = "http://127.0.0.1:8000/api/v1"

      - name: Print endpoint
        run: |
          echo "https://${{ steps.deploy_outputs.outputs.container_app_fqdn }}"
